# ==============================================================================
# nginx.conf
#
# Serves:
#   - the static dashboard at /sample_points.html  (Task 6)
#   - the Shiny app, reverse-proxied, at /ais_app/  (Task 7.4)
#
# Adjust server_name / port mapping to match what your AIDAHO server
# assigns. If the skeleton repo already ships an nginx.conf, merge the
# /ais_app location block below into it rather than overwriting it.
# ==============================================================================

server {
    listen 80;
    server_name _;

    # Task 6: static HTML dashboard, served directly as a file
    location /sample_points.html {
        root /usr/share/nginx/html;
    }

    # Task 7.4: reverse proxy to the Shiny app container
    location /ais_app/ {
        proxy_pass http://shiny:3838/;
        proxy_redirect / $scheme://$host/ais_app/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 20d;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
